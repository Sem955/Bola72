<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOV Miner - Dashboard</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlXIQ42acjO8xZH-Ti__YL6h9SGQQKQto",
            authDomain: "govminer.firebaseapp.com",
            projectId: "govminer",
            storageBucket: "govminer.firebasestorage.app",
            messagingSenderId: "408110658500",
            appId: "1:408110658500:web:3fe7f4bd9a35f3fe726a91"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.auth = auth;
        window.db = db;
        window.signOut = signOut;
        window.doc = doc;
        window.getDoc = getDoc;
        window.setDoc = setDoc;
        window.updateDoc = updateDoc;
        window.onAuthStateChanged = onAuthStateChanged;
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        .header {
            background: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .profile-section { display: flex; align-items: center; gap: 12px; }
        .profile-pic {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
        .profile-name { font-weight: bold; color: #333; }
        .profile-email { font-size: 12px; color: #666; }
        .menu-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #667eea; }
        .menu-dropdown {
            display: none;
            position: absolute;
            top: 70px;
            right: 20px;
            background: white;
            border-radius: 12px;
            width: 180px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1000;
        }
        .menu-dropdown a {
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            color: #333;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .card {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .balance-value { font-size: 36px; font-weight: bold; color: #667eea; }
        .mining-timer { font-size: 24px; font-weight: bold; color: #ff9800; margin: 15px 0; }
        .claim-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .claim-btn:disabled { opacity: 0.5; }
        .tap-button {
            width: 140px; height: 140px;
            border-radius: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 auto 20px;
        }
        .tap-button:active { transform: scale(0.95); }
        .tap-stats { display: flex; justify-content: space-around; margin-top: 20px; }
        .stat-value { font-size: 20px; font-weight: bold; color: #667eea; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
        .nav-btn {
            background: none;
            border: none;
            text-align: center;
            cursor: pointer;
            color: #999;
            font-size: 12px;
        }
        .nav-btn.active { color: #667eea; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 350px;
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 9999;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            display: none;
            z-index: 3000;
            font-size: 14px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div style="text-align: center;">
        <div class="spinner"></div>
        <p>Loading dashboard...</p>
    </div>
</div>

<div id="notification" class="notification"></div>

<div class="header">
    <div class="profile-section">
        <div class="profile-pic" id="profilePic">👤</div>
        <div>
            <div class="profile-name" id="usernameDisplay">-</div>
            <div class="profile-email" id="userEmail">-</div>
        </div>
    </div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>

<div id="menuDropdown" class="menu-dropdown">
    <a onclick="logout()">🚪 Logout</a>
</div>

<div class="card">
    <div style="color:#666;">GOV Balance</div>
    <div class="balance-value" id="govBalance">0</div>
</div>

<div class="card">
    <div style="font-weight:bold;">⛏️ Auto Mining</div>
    <div style="font-size:14px; color:#666; margin:10px 0;">Reward: 500 GOV/jam</div>
    <div class="mining-timer" id="miningTimer">Ready!</div>
    <button class="claim-btn" id="claimBtn">Claim Reward</button>
</div>

<div class="card">
    <div style="font-weight:bold; font-size:20px;">Tap-to-Earn</div>
    <div style="font-size:14px; color:#666; margin-bottom:20px;">Tap untuk dapat GOV!</div>
    <button class="tap-button" id="tapButton">👆 TAP</button>
    <div class="tap-stats">
        <div><div class="stat-value" id="tapCount">0</div><div style="font-size:12px;">Total Tap</div></div>
        <div><div class="stat-value" id="tapMultiplier">1x</div><div style="font-size:12px;">Multiplier</div></div>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-btn active" id="claimNavBtn">⛏️ Mining</button>
    <button class="nav-btn" id="referralNavBtn">👥 Referral</button>
</div>

<div id="referralModal" class="modal">
    <div class="modal-content">
        <h3 style="color:#667eea; margin-bottom:15px;">Referral Program</h3>
        <p style="margin-bottom:10px;">Bagikan link ini ke teman:</p>
        <input type="text" id="referralLink" readonly style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px;">
        <button onclick="copyReferralLink()" style="width:100%; padding:12px; background:#667eea; color:white; border:none; border-radius:8px; margin-bottom:15px; cursor:pointer;">Salin Link</button>
        <hr style="margin:15px 0;">
        <p><strong>Jumlah Referral:</strong> <span id="referralCount">0</span></p>
        <p><strong>Poin Referral:</strong> <span id="referralPoints">0</span></p>
        <button onclick="closeModal()" style="width:100%; padding:12px; margin-top:15px; background:#ccc; border:none; border-radius:8px; cursor:pointer;">Tutup</button>
    </div>
</div>

<script>
    const CLAIM_REWARD = 500;
    const COOLDOWN_MS = 60 * 60 * 1000;
    
    let currentUser = null;
    let userData = {
        uid: '', name: '', email: '',
        saldoGOV: 0, tapCount: 0, tapMultiplier: 1,
        referralPoints: 0, referrals: [], lastClaimTime: null
    };
    
    function showNotification(msg, success=true) {
        const n = document.getElementById('notification');
        n.textContent = msg;
        n.style.backgroundColor = success ? '#4caf50' : '#f44336';
        n.style.display = 'block';
        setTimeout(() => n.style.display = 'none', 3000);
    }
    
    function toggleMenu() {
        const m = document.getElementById('menuDropdown');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }
    
    function closeModal() {
        document.getElementById('referralModal').style.display = 'none';
    }
    
    async function updateUI() {
        document.getElementById('govBalance').textContent = userData.saldoGOV.toLocaleString();
        document.getElementById('tapCount').textContent = userData.tapCount;
        document.getElementById('tapMultiplier').textContent = userData.tapMultiplier + 'x';
        document.getElementById('usernameDisplay').textContent = userData.name || (userData.email ? userData.email.split('@')[0] : 'User');
        document.getElementById('userEmail').textContent = userData.email || '-';
        document.getElementById('profilePic').textContent = (userData.name || 'U')[0].toUpperCase();
        document.getElementById('referralCount').textContent = userData.referrals.length;
        document.getElementById('referralPoints').textContent = userData.referralPoints;
        
        const link = `${window.location.origin}${window.location.pathname.replace('dashboard.html', 'index.html')}?ref=${userData.uid}`;
        document.getElementById('referralLink').value = link;
    }
    
    function updateMiningUI() {
        const now = Date.now();
        const claimBtn = document.getElementById('claimBtn');
        const timerDiv = document.getElementById('miningTimer');
        
        if (!userData.lastClaimTime) {
            claimBtn.disabled = false;
            timerDiv.textContent = 'Siap klaim!';
            timerDiv.style.color = '#4caf50';
            return;
        }
        
        const elapsed = now - userData.lastClaimTime;
        if (elapsed >= COOLDOWN_MS) {
            claimBtn.disabled = false;
            timerDiv.textContent = 'Siap klaim!';
            timerDiv.style.color = '#4caf50';
        } else {
            claimBtn.disabled = true;
            const remaining = COOLDOWN_MS - elapsed;
            const minutes = Math.floor(remaining / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            timerDiv.textContent = `${minutes}m ${seconds}s`;
            timerDiv.style.color = '#ff9800';
        }
    }
    
    async function claimReward() {
        const now = Date.now();
        if (userData.lastClaimTime && (now - userData.lastClaimTime) < COOLDOWN_MS) {
            showNotification('Mining masih berjalan!', false);
            return;
        }
        userData.saldoGOV += CLAIM_REWARD;
        userData.lastClaimTime = now;
        await saveToFirebase();
        await updateUI();
        updateMiningUI();
        showNotification(`+${CLAIM_REWARD} GOV berhasil diklaim!`);
    }
    
    async function handleTap() {
        const tapBtn = document.getElementById('tapButton');
        tapBtn.style.transform = 'scale(0.95)';
        setTimeout(() => tapBtn.style.transform = 'scale(1)', 100);
        
        const earned = (Math.floor(Math.random() * 3) + 1) * userData.tapMultiplier;
        userData.tapCount++;
        userData.saldoGOV += earned;
        
        if (userData.tapCount >= 100 && userData.tapMultiplier < 2) {
            userData.tapMultiplier = 2;
            showNotification('🎉 Multiplier naik ke 2x!');
        } else if (userData.tapCount >= 500 && userData.tapMultiplier < 3) {
            userData.tapMultiplier = 3;
            showNotification('🎉 Multiplier naik ke 3x!');
        } else if (userData.tapCount >= 1000 && userData.tapMultiplier < 5) {
            userData.tapMultiplier = 5;
            showNotification('🎉 Multiplier naik ke 5x!');
        }
        
        await saveToFirebase();
        await updateUI();
        showNotification(`+${earned} GOV`, true);
    }
    
    async function saveToFirebase() {
        if (!currentUser) return;
        try {
            const userRef = window.doc(window.db, 'users', currentUser.uid);
            await window.updateDoc(userRef, {
                saldoGOV: userData.saldoGOV,
                tapCount: userData.tapCount,
                tapMultiplier: userData.tapMultiplier,
                referralPoints: userData.referralPoints,
                referrals: userData.referrals,
                lastClaimTime: userData.lastClaimTime,
                lastUpdated: new Date().toISOString()
            });
        } catch(e) { console.error(e); }
    }
    
    async function loadFromFirebase(uid) {
        try {
            const userRef = window.doc(window.db, 'users', uid);
            const docSnap = await window.getDoc(userRef);
            if (docSnap.exists()) {
                const d = docSnap.data();
                userData = {
                    uid: uid,
                    name: d.name || '',
                    email: d.email || '',
                    saldoGOV: d.saldoGOV || 100,
                    tapCount: d.tapCount || 0,
                    tapMultiplier: d.tapMultiplier || 1,
                    referralPoints: d.referralPoints || 0,
                    referrals: d.referrals || [],
                    lastClaimTime: d.lastClaimTime || null
                };
            } else {
                await window.setDoc(userRef, {
                    uid: uid,
                    email: currentUser.email,
                    name: currentUser.email.split('@')[0],
                    saldoGOV: 100,
                    tapCount: 0,
                    tapMultiplier: 1,
                    referralPoints: 0,
                    referrals: [],
                    lastClaimTime: null,
                    createdAt: new Date().toISOString()
                });
                userData = {
                    uid: uid,
                    name: currentUser.email.split('@')[0],
                    email: currentUser.email,
                    saldoGOV: 100,
                    tapCount: 0,
                    tapMultiplier: 1,
                    referralPoints: 0,
                    referrals: [],
                    lastClaimTime: null
                };
            }
            await updateUI();
            updateMiningUI();
        } catch(e) { console.error(e); }
    }
    
    async function logout() {
        await window.signOut(window.auth);
        window.location.href = 'index.html';
    }
    
    function copyReferralLink() {
        const input = document.getElementById('referralLink');
        input.select();
        document.execCommand('copy');
        showNotification('Link berhasil disalin!');
    }
    
    // Initialize
    window.onAuthStateChanged(window.auth, async (user) => {
        const loading = document.getElementById('loadingOverlay');
        if (user) {
            currentUser = user;
            await loadFromFirebase(user.uid);
            loading.style.display = 'none';
            
            document.getElementById('claimBtn').onclick = claimReward;
            document.getElementById('tapButton').onclick = handleTap;
            document.getElementById('claimNavBtn').onclick = () => document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('referralNavBtn').onclick = () => document.getElementById('referralModal').style.display = 'flex';
            
            setInterval(updateMiningUI, 1000);
            showNotification('Selamat datang di GOV Miner!');
        } else {
            window.location.href = 'index.html';
        }
    });
</script>
</body>
</html>
